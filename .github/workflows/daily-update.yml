name: Daily Repository Update

on:
  schedule:
    # Runs every day at 09:30 UTC (change minute/hour if needed, but no wildcards)
    - cron: '30 9 * * *'
  workflow_dispatch:  # allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "24f2001786@ds.study.iitm.ac.in"

      - name: Update timestamp file - 24f2001786@ds.study.iitm.ac.in
        run: |
          echo "Last update: $(date -u)" >> daily-log.txt

      - name: Commit and push changes
        run: |
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
